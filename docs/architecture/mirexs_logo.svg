<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220" role="img" aria-label="Mirexs logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="220" height="220" rx="28" fill="url(#bg)"/>

  <!-- Ears -->
  <path d="M62 86 L78 50 L98 82 Z" fill="url(#accent)" opacity="0.95"/>
  <path d="M158 86 L142 50 L122 82 Z" fill="url(#accent)" opacity="0.95"/>

  <!-- Face -->
  <circle cx="110" cy="120" r="62" fill="#0F172A" stroke="#334155" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="88" cy="118" r="7" fill="#E5E7EB"/>
  <circle cx="132" cy="118" r="7" fill="#E5E7EB"/>
  <circle cx="90" cy="120" r="3.2" fill="#111827"/>
  <circle cx="134" cy="120" r="3.2" fill="#111827"/>

  <!-- Nose + mouth -->
  <path d="M110 130 L104 138 L116 138 Z" fill="#FCA5A5"/>
  <path d="M110 138 C104 142, 98 146, 94 150" fill="none" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round"/>
  <path d="M110 138 C116 142, 122 146, 126 150" fill="none" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round"/>

  <!-- Title -->
  <text x="110" y="198" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" fill="#E5E7EB" letter-spacing="1.2">
    MIREXS
  </text>
</svg>

