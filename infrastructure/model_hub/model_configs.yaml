# 模型元数据清单（Model Hub）
#
# 口径说明：
# - 本文件仅描述“画像/元数据”，并不携带真实权重。
# - 若要启用自动下载，请为模型补充 `url`（HTTP/HTTPS 或 file://）与可选 `sha256`。
# - `path` 支持相对路径（相对 repo 根目录）或绝对路径；未提供时默认落在 data/models/<family>/<id>。
#
# 字段兼容：
# - id 与 model_id 等价
# - tags 与 capability_tags 等价
# - vram_requirement_gb 与 vram_est_gb 等价
# - context_window 与 ctx_len 等价

models:
  # --- 本地通用/聊天模型（示例） ---
  - id: qwen2.5-7b-instruct-q4_k_m.gguf
    family: qwen
    quant: q4_k_m
    backend: llama_cpp
    vram_est_gb: 6.5
    ctx_len: 32768
    tps_chat: 55
    tps_reason: 35
    capability_tags: ["chat", "general", "stable"]
    modalities: ["text"]
    deployment: local
    enabled: true
    path: data/models/nlp/gguf/qwen2.5-7b-instruct-q4_k_m.gguf

  - id: qwen2.5-32b-instruct-q5_k_m.gguf
    family: qwen
    quant: q5_k_m
    backend: llama_cpp
    vram_est_gb: 21.8
    ctx_len: 131072
    tps_chat: 58
    tps_reason: 38
    capability_tags: ["chat", "emotional", "long_ctx", "stable"]
    modalities: ["text"]
    deployment: local
    enabled: true
    path: data/models/nlp/gguf/qwen2.5-32b-instruct-q5_k_m.gguf

  # --- 编程/复杂推理模型（示例） ---
  - id: deepseek-v3-coder-q4_k_m.gguf
    family: deepseek
    quant: q4_k_m
    backend: llama_cpp
    vram_est_gb: 18.0
    ctx_len: 65536
    tps_chat: 40
    tps_reason: 28
    capability_tags: ["coding", "code", "reasoning", "stable"]
    modalities: ["text"]
    deployment: local
    enabled: true
    path: data/models/nlp/gguf/deepseek-v3-coder-q4_k_m.gguf

  # --- 云端增强模型（示例；restricted 场景会被禁用） ---
  - id: cloud-llm-pro-2026-03
    family: cloud
    quant: fp16
    backend: cloud
    vram_est_gb: 0
    ctx_len: 200000
    tps_chat: 120
    tps_reason: 80
    capability_tags: ["chat", "reasoning", "experimental"]
    modalities: ["text"]
    deployment: cloud
    is_cloud: true
    enabled: false

