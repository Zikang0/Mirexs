# config/system/main_config.yaml
# Mirexs 系统主配置文件
# 更新日期：2026-03-30
# 配置Schema版本：2.0.0

# 配置元信息（v2.0 起引入；业务代码不应依赖该段做功能判断）
meta:
  schema_version: "2.0.0"
  last_updated: "2026-03-30"
  owner: "Mirexs Team"
  change_notes:
    - "覆盖原 v1 配置为 v2：统一版本号口径，补齐路由/组件配置入口，修正若干目录与配置加载约定。"

# 系统基本信息
system:
  name: "Mirexs AI Digital Lifeform"
  version: "2.0.0"
  description: "全栈AI数字生命体系统（2.0）"
  author: "Mirexs Team"
  license: "Apache 2.0"

# 运行模式配置
mode:
  # 运行模式：development, testing, production
  environment: "development"

  # 调试配置
  debug: true
  debug_port: 5678  # 调试端口

  # 性能模式：balanced, performance, battery_saver
  performance_mode: "balanced"

  # 安全模式：normal, secure, paranoid
  security_mode: "normal"

# 日志配置
logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"

  # 日志输出
  console:
    enabled: true
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  file:
    enabled: true
    path: "logs/system.log"
    max_size_mb: 100  # 每个日志文件最大大小
    backup_count: 10  # 保留的备份文件数
    format: "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"

  # 日志轮转策略
  rotation:
    when: "midnight"  # midnight, W0 (周一), h (小时)
    interval: 1
    backup_count: 30

# 性能配置
performance:
  # CPU配置
  cpu:
    max_workers: 8  # 最大工作线程数
    thread_pool_size: 20
    affinity: "auto"  # auto, performance, power_saver

  # 内存配置
  memory:
    cache_size_mb: 1024  # 内存缓存大小
    model_cache_size_mb: 2048  # 模型缓存大小
    garbage_collection_threshold: 0.8  # 垃圾回收阈值

  # GPU配置
  gpu:
    enabled: true
    device_id: 0  # GPU设备ID
    memory_fraction: 0.8  # GPU内存使用比例
    mixed_precision: true  # 混合精度训练

  # 推理优化
  inference:
    batch_size: 8
    max_queue_size: 100
    timeout_seconds: 30

# 路径配置
paths:
  # 数据路径
  data_dir: "data"
  models_dir: "data/models"
  cache_dir: "data/cache"
  temp_dir: "data/temp"

  # 用户数据
  user_data_dir: "data/users"
  profiles_dir: "data/users/profiles"
  history_dir: "data/users/history"

  # 系统数据
  logs_dir: "data/logs"
  config_dir: "config"
  plugins_dir: "plugins"

  # v2：组件/子系统配置统一入口（用于各子系统 get_config('xxx_config') 的查找约定）
  component_configs_dir: "config/system/component_configs"

  # v2：交互配置（可选；部分模块仍会直接读取 json 文件）
  keyboard_layouts_dir: "config/keyboard_layouts"
  shortcuts_dir: "config/shortcuts"

# v2：基础设施层配置（与 infrastructure 层代码对齐；未实现的模块允许保持 disabled）
infrastructure:
  model_hub:
    enabled: true
    registry_file: "infrastructure/model_hub/model_configs.yaml"
    router_policy_file: "config/system/model_configs/router_config.yaml"
    allow_network_download: false
    eager_load: false

  storage_migration:
    enabled: false
    config_file: "infrastructure/storage_migration/migration_config.yaml"

# 资源限制
limits:
  # 进程限制
  process:
    max_processes: 50
    memory_limit_mb: 8192
    cpu_limit_percent: 80

  # 网络限制
  network:
    max_connections: 1000
    max_upload_mbps: 100
    max_download_mbps: 100

  # 存储限制
  storage:
    max_storage_gb: 100
    warning_threshold_gb: 80
    cleanup_threshold_gb: 90

  # API限制
  api:
    max_requests_per_minute: 1000
    max_requests_per_ip_per_minute: 100

# 特征开关
features:
  # 核心功能
  core:
    task_decomposition: true
    memory_management: true
    learning_system: true
    multi_agent_coordination: true

  # 交互功能
  interaction:
    voice_recognition: true
    speech_synthesis: true
    facial_recognition: true
    emotion_detection: true
    3d_avatar: true

  # 工具功能
  tools:
    document_generation: true
    image_generation: true
    code_assistance: true
    system_automation: true

  # 高级功能
  advanced:
    federated_learning: false
    reinforcement_learning: false
    quantum_integration: false

# 更新配置
update:
  # 自动更新
  auto_check: true
  check_interval_hours: 24

  # 更新源
  sources:
    - name: "official"
      url: "https://updates.mirexs.ai"
      priority: 1

  # 更新策略
  strategy: "auto_download_manual_install"  # auto, manual, auto_download_manual_install

  # 回滚配置
  rollback:
    enabled: true
    keep_versions: 3
    auto_rollback_on_failure: true

# 国际化配置
internationalization:
  # 默认语言
  default_language: "zh-CN"

  # 支持的语言
  supported_languages:
    - code: "zh-CN"
      name: "简体中文"
      locale: "zh_CN"
    - code: "en-US"
      name: "English (US)"
      locale: "en_US"
    - code: "ja-JP"
      name: "日本語"
      locale: "ja_JP"
    - code: "ko-KR"
      name: "한국어"
      locale: "ko_KR"

  # 日期时间格式
  datetime:
    date_format: "YYYY-MM-DD"
    time_format: "HH:mm:ss"
    datetime_format: "YYYY-MM-DD HH:mm:ss"

  # 区域设置
  locale:
    timezone: "Asia/Shanghai"
    currency: "CNY"
    measurement_system: "metric"  # metric, imperial

# 监控配置
monitoring:
  # 系统监控
  system:
    enabled: true
    interval_seconds: 60
    metrics:
      - cpu_usage
      - memory_usage
      - disk_usage
      - network_io
      - process_count

  # 应用监控
  application:
    enabled: true
    interval_seconds: 10
    metrics:
      - response_time
      - request_rate
      - error_rate
      - active_users

  # 模型监控
  model:
    enabled: true
    interval_seconds: 30
    metrics:
      - inference_time
      - accuracy
      - memory_usage
      - throughput

# 备份配置
backup:
  # 自动备份
  auto_backup: true
  backup_interval_hours: 24

  # 备份目标
  destinations:
    - type: "local"
      path: "data/backups"
      retention_days: 30
    - type: "cloud"
      provider: "aws_s3"
      bucket: "mirexs-backups"
      retention_days: 90

  # 备份内容
  content:
    user_data: true
    system_config: true
    model_files: false  # 模型文件较大，默认不备份
    logs: false

  # 备份策略
  strategy: "incremental"  # full, incremental, differential

# 高级配置
advanced:
  # AI模型配置
  ai:
    max_context_length: 8192
    temperature: 0.7
    top_p: 0.9
    presence_penalty: 0.0
    frequency_penalty: 0.0

  # 网络配置
  network:
    proxy:
      enabled: false
      url: "http://proxy.example.com:8080"
      bypass: ["localhost", "127.0.0.1"]

    # DNS配置
    dns:
      servers: ["8.8.8.8", "1.1.1.1"]
      cache_enabled: true
      cache_ttl_seconds: 300

  # 安全配置
  security:
    ssl_verify: true
    certificate_validation: true
    insecure_warning: true

  # 开发配置
  development:
    hot_reload: true
    profiling_enabled: false
    trace_enabled: false

# 环境变量映射
environment_mappings:
  # 路径映射
  MIREXS_DATA_DIR: "paths.data_dir"
  MIREXS_MODELS_DIR: "paths.models_dir"
  MIREXS_CACHE_DIR: "paths.cache_dir"

  # 性能映射
  MIREXS_MAX_WORKERS: "performance.cpu.max_workers"
  MIREXS_GPU_ENABLED: "performance.gpu.enabled"

  # 功能映射
  MIREXS_DEBUG_MODE: "mode.debug"
  MIREXS_LOG_LEVEL: "logging.level"

# 版本兼容性
compatibility:
  # 最低系统要求
  minimum_requirements:
    python_version: "3.9.0"
    torch_version: "2.1.0"
    cuda_version: "12.0"

  # 支持的操作系统
  supported_os:
    windows:
      min_version: "10"
      recommended_version: "11"
    linux:
      min_version: "Ubuntu 20.04"
      recommended_version: "Ubuntu 22.04"
    macos:
      min_version: "11.0"
      recommended_version: "14.0"

  # 依赖版本锁定
  dependencies:
    torch: "==2.1.0"
    transformers: "==4.37.0"
    fastapi: "==0.104.1"
    pandas: "==2.2.0"
