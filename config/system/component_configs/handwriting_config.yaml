# Mirexs v2 组件配置：手写识别（HandwritingRecognizer）
meta:
  schema_version: "2.0.0"
  last_updated: "2026-03-30"
  config_id: "system.component.handwriting_config"
  owner: "Mirexs Team"

enable_realtime: true
confidence_threshold: 0.7
max_alternatives: 5

supported_languages:
  - "zh-CN"
  - "en-US"

preprocessing:
  image_size: [256, 256]
  smoothing_window: 5
  min_stroke_length: 5

