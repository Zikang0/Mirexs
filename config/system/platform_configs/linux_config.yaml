# config/system/platform_configs/linux_config.yaml
# Linux平台特定配置

# 系统信息
system:
  name: "Linux"
  min_version: "Ubuntu 20.04"
  recommended_version: "Ubuntu 22.04"
  architecture: "x86_64"
  bitness: 64
  kernel: "${uname -r}"

# 发行版特定配置
distributions:
  ubuntu:
    package_manager: "apt"
    dependencies:
      - "python3.9"
      - "python3-pip"
      - "ffmpeg"
      - "libportaudio2"
      - "libopencv-dev"
      - "nvidia-cuda-toolkit"
    repositories:
      - "ppa:graphics-drivers/ppa"

  debian:
    package_manager: "apt"
    dependencies:
      - "python3.9"
      - "python3-pip"
      - "ffmpeg"
      - "portaudio19-dev"

  fedora:
    package_manager: "dnf"
    dependencies:
      - "python3.9"
      - "python3-pip"
      - "ffmpeg"
      - "portaudio-devel"

  arch:
    package_manager: "pacman"
    dependencies:
      - "python"
      - "python-pip"
      - "ffmpeg"
      - "portaudio"

# 路径配置
paths:
  # 系统路径
  home: "${HOME}"
  tmp: "/tmp"
  usr_local: "/usr/local"
  opt: "/opt"

  # Mirexs特定路径
  mirexs_data: "${HOME}/.local/share/mirexs"
  mirexs_config: "${HOME}/.config/mirexs"
  mirexs_logs: "${HOME}/.local/share/mirexs/logs"
  mirexs_cache: "${HOME}/.cache/mirexs"
  mirexs_models: "${HOME}/.local/share/mirexs/models"

  # 系统范围安装
  system_install:
    prefix: "/opt/mirexs"
    bin: "/usr/local/bin"
    lib: "/usr/local/lib"
    share: "/usr/local/share"

  # 可执行文件路径
  python_exe: "/usr/bin/python3"
  ffmpeg_path: "/usr/bin/ffmpeg"

  # 库路径
  ld_library_paths:
    - "/usr/local/lib"
    - "/usr/lib"
    - "/usr/lib/x86_64-linux-gnu"
    - "/usr/local/cuda/lib64"

# 图形配置
graphics:
  # 图形API
  api:
    primary: "opengl"
    versions:
      opengl: "4.6"
      vulkan: "1.3"

  # 显示服务器
  display_server:
    type: "${XDG_SESSION_TYPE}"  # x11, wayland
    fallback: "x11"

  # 桌面环境
  desktop_environment:
    gnome:
      shell_integration: true
      extensions:
        - "mirexs-integration@mirexs.ai"
    kde:
      plasma_integration: true
      widgets: ["mirexs-widget"]
    xfce:
      panel_plugin: true

  # 渲染配置
  rendering:
    hardware_acceleration: true
    vsync: true
    compositor: true

  # 性能优化
  performance:
    gpu_preference: "discrete"
    power_preference: "performance"
    texture_quality: "high"

# 音频配置
audio:
  # 音频服务器
  server: "pulseaudio"  # pulseaudio, pipewire, alsa
  fallback: "alsa"

  # 设备配置
  devices:
    input:
      default: "default"
      type: "capture"
    output:
      default: "default"
      type: "playback"

  # 音频处理
  processing:
    echo_cancellation: true
    noise_suppression: module-echo-cancel
    automatic_gain_control: true

  # 格式配置
  format:
    sample_rate: 48000
    channels: 2
    bits_per_sample: 16

# 输入配置
input:
  # 鼠标配置
  mouse:
    sensitivity: 1.0
    acceleration: "flat"
    natural_scroll: false

  # 键盘配置
  keyboard:
    layout: "us"
    variant: ""
    options: []

  # 触摸配置
  touch:
    enabled: false
    multi_touch: true
    gesture_support: true

  # 手写板
  tablet:
    enabled: false
    pressure_sensitivity: true

# 网络配置
network:
  # 网络管理器
  network_manager:
    enabled: true
    service: "NetworkManager"

  # 防火墙
  firewall:
    backend: "ufw"  # ufw, firewalld, iptables
    auto_configure: true
    rules:
      - port: "8000"
        protocol: "tcp"
        action: "allow"

  # 网络服务
  services:
    avahi: true
    cups: false

# 安全配置
security:
  # 权限管理
  permissions:
    user_isolation: true
    sandboxing: true
    apparmor:
      enabled: true
      profile: "/etc/apparmor.d/mirexs"
    selinux:
      enabled: false
      context: "mirexs_t"

  # 安全增强
  hardening:
    aslr: true
    stack_protection: true
    fortify_source: true

  # 密钥环集成
  keyring:
    enabled: true
    backend: "gnome-keyring"  # gnome-keyring, kwallet

# 系统集成
integration:
  # 启动器集成
  launcher:
    desktop_entry: true
    path: "${HOME}/.local/share/applications/mirexs.desktop"
    categories: ["Utility", "AI", "Education"]

  # 通知集成
  notifications:
    enabled: true
    server: "freedesktop"
    urgency: "normal"
    timeout: 5000

  # 系统托盘
  system_tray:
    enabled: true
    standard: "freedesktop"
    icon_theme: "hicolor"

  # MIME类型
  mime_types:
    .mirexs: "application/x-mirexs"
    .mirexscfg: "application/x-mirexs-config"

# 性能优化
performance:
  # 电源管理
  power:
    governor: "performance"  # powersave, conservative, ondemand, performance
    sleep_inhibit: true

  # 内存管理
  memory:
    transparent_hugepages: true
    swapiness: 10
    oom_killer: true

  # 进程调度
  process:
    scheduler: "cfs"
    nice: 0
    ionice_class: "best-effort"

  # 磁盘I/O
  disk:
    scheduler: "mq-deadline"  # mq-deadline, bfq, kyber, none
    read_ahead_kb: 128

# 系统服务
services:
  # Systemd服务
  systemd:
    enabled: true
    service_file: "/etc/systemd/system/mirexs.service"
    user_service: "${HOME}/.config/systemd/user/mirexs.service"
    type: "notify"  # simple, forking, oneshot, notify, dbus

  # 守护进程
  daemon:
    enabled: true
    user: "${USER}"
    group: "${USER}"

  # 自动启动
  autostart:
    systemd: true
    xdg_autostart: true

# 开发工具
development:
  # 编译工具链
  toolchain:
    compiler: "gcc"
    version: "11"
    cuda: true
    opencl: true

  # 调试工具
  debugging:
    gdb: true
    valgrind: false
    strace: false

  # 容器支持
  containers:
    docker: true
    podman: false
    singularity: false

# 包管理
package_management:
  # 软件包格式
  formats:
    debian:
      enabled: true
      architecture: "amd64"
      dependencies:
        - "python3 (>= 3.9)"
        - "python3-pip"
        - "ffmpeg"

    snap:
      enabled: false
      confinement: "strict"
      plugs: ["home", "network", "audio-playback", "audio-record"]

    flatpak:
      enabled: false
      runtime: "org.freedesktop.Platform"
      sdk: "org.freedesktop.Sdk"

    appimage:
      enabled: true
      update: "gh-releases"

# 日志配置
logging:
  # 系统日志
  system:
    backend: "journald"
    identifier: "mirexs"
    priority: "info"

  # 日志轮转
  rotation:
    enabled: true
    config: "/etc/logrotate.d/mirexs"
    frequency: "daily"
    keep: 30

  # 审计日志
  audit:
    enabled: false
    rules: "/etc/audit/rules.d/mirexs.rules"