# config/system/model_configs/speech_models.yaml
# 语音模型配置
# 包含语音识别、语音合成、语音处理等模型

# 通用语音配置
general:
  # 音频处理配置
  audio:
    sample_rate: 16000
    channels: 1
    bit_depth: 16
    chunk_size: 1024
    silence_threshold: 0.01

  # 预处理配置
  preprocessing:
    noise_reduction: true
    echo_cancellation: true
    gain_normalization: true
    vad_enabled: true  # 语音活动检测

  # 后处理配置
  postprocessing:
    punctuation_restoration: true
    capitalization: true
    profanity_filter: false

# 语音识别模型 (ASR)
asr:
  # 默认ASR模型
  default_model: "whisper-medium"

  # ASR模型列表
  models:
    - name: "whisper-tiny"
      type: "asr"
      framework: "pytorch"
      device: "auto"
      path: "models/speech/whisper-tiny.pt"
      url: "https://huggingface.co/openai/whisper-tiny"
      version: "v1"
      enabled: true
      priority: 3
      memory_mb: 500
      languages: ["en", "zh", "ja", "ko", "fr", "de", "es"]
      features:
        realtime: true
        streaming: true
        punctuation: true
        diarization: false

    - name: "whisper-small"
      type: "asr"
      framework: "pytorch"
      device: "auto"
      path: "models/speech/whisper-small.pt"
      url: "https://huggingface.co/openai/whisper-small"
      version: "v1"
      enabled: true
      priority: 2
      memory_mb: 800
      languages: ["en", "zh", "ja", "ko", "fr", "de", "es", "ru", "ar"]
      accuracy: 0.85

    - name: "whisper-medium"
      type: "asr"
      framework: "pytorch"
      device: "gpu"
      path: "models/speech/whisper-medium.pt"
      url: "https://huggingface.co/openai/whisper-medium"
      version: "v1"
      enabled: true
      priority: 1
      memory_mb: 1500
      requires_gpu: true
      languages: ["en", "zh", "ja", "ko", "fr", "de", "es", "ru", "ar", "it", "pt"]
      accuracy: 0.92
      features:
        realtime: true
        streaming: true
        punctuation: true
        diarization: true
        speaker_identification: true

    - name: "whisper-large-v3"
      type: "asr"
      framework: "pytorch"
      device: "gpu"
      path: "models/speech/whisper-large-v3.pt"
      url: "https://huggingface.co/openai/whisper-large-v3"
      version: "v3"
      enabled: true
      priority: 0  # 最高优先级
      memory_mb: 3000
      requires_gpu: true
      languages: ["en", "zh", "ja", "ko", "fr", "de", "es", "ru", "ar", "it", "pt", "nl", "tr", "pl", "sv", "fi", "no", "da", "el", "hu", "cs", "ro", "sk", "sl", "hr", "bs", "sr", "mk", "bg"]
      accuracy: 0.96

    - name: "vosk-small"
      type: "asr"
      framework: "custom"
      device: "cpu"
      path: "models/speech/vosk-model-small"
      url: "https://alphacephei.com/vosk/models"
      version: "0.22"
      enabled: true
      priority: 4
      memory_mb: 200
      languages: ["en", "zh", "ru"]
      features:
        realtime: true
        streaming: true
        offline: true
        low_latency: true

# 语音合成模型 (TTS)
tts:
  # 默认TTS模型
  default_model: "xtts-v2"

  # TTS模型列表
  models:
    - name: "coqui-tts"
      type: "tts"
      framework: "pytorch"
      device: "gpu"
      path: "models/speech/coqui-tts"
      url: "https://github.com/coqui-ai/TTS"
      version: "0.0.15"
      enabled: true
      priority: 2
      memory_mb: 2000
      requires_gpu: true
      languages: ["en", "zh", "es", "fr", "de", "it"]
      voices: ["male", "female", "neutral"]
      features:
        multi_speaker: true
        emotion_control: true
        speed_control: true
        pitch_control: true

    - name: "xtts-v2"
      type: "tts"
      framework: "pytorch"
      device: "gpu"
      path: "models/speech/xtts-v2"
      url: "https://huggingface.co/coqui/XTTS-v2"
      version: "v2"
      enabled: true
      priority: 1
      memory_mb: 2500
      requires_gpu: true
      languages: ["en", "zh", "es", "fr", "de", "it", "pt", "pl", "tr", "ru", "nl", "cs", "ar", "hu", "ko", "ja"]
      voices: ["male", "female", "neutral"]
      quality: "high"
      features:
        voice_cloning: true
        cross_lingual: true
        emotion_control: true
        style_transfer: true

    - name: "espeak-ng"
      type: "tts"
      framework: "system"
      device: "cpu"
      path: ""
      version: "1.51.1"
      enabled: true
      priority: 5
      memory_mb: 50
      languages: ["en", "zh", "es", "fr", "de", "it", "ru", "ar", "ja", "ko"]
      voices: ["default"]
      features:
        offline: true
        fast: true
        lightweight: true

# 语音增强模型
enhancement:
  models:
    - name: "demucs"
      type: "enhancement"
      framework: "pytorch"
      device: "gpu"
      path: "models/speech/demucs.pt"
      url: "https://github.com/facebookresearch/demucs"
      version: "v3"
      enabled: true
      purpose: "music_separation"

    - name: "noisereduce"
      type: "enhancement"
      framework: "numpy"
      device: "cpu"
      path: ""
      version: "0.3.0"
      enabled: true
      purpose: "noise_reduction"

# 唤醒词模型
wake_word:
  # 默认唤醒词
  default_word: "hey_mirexs"

  models:
    - name: "porcupine"
      type: "wake_word"
      framework: "custom"
      device: "cpu"
      path: "models/speech/porcupine"
      url: "https://github.com/Picovoice/Porcupine"
      version: "3.0"
      enabled: true
      sensitivity: 0.5
      keywords: ["hey_mirexs", "computer", "alexa", "hey_siri"]

    - name: "snowboy"
      type: "wake_word"
      framework: "custom"
      device: "cpu"
      path: "models/speech/snowboy"
      url: "https://github.com/Kitt-AI/snowboy"
      version: "1.3.0"
      enabled: true
      sensitivity: 0.5
      keywords: ["mirexs", "hey_kitty"]

# 语音情感识别
emotion_recognition:
  models:
    - name: "wav2vec2-emotion"
      type: "emotion"
      framework: "pytorch"
      device: "gpu"
      path: "models/speech/wav2vec2-emotion.pt"
      url: "https://huggingface.co/audeering/wav2vec2-large-robust-12-ft-emotion-msp-dim"
      version: "1.0"
      enabled: true
      emotions: ["neutral", "happy", "sad", "angry", "fearful", "disgusted", "surprised"]
      accuracy: 0.78

# 声纹识别
speaker_recognition:
  models:
    - name: "speechbrain-ecapa"
      type: "speaker"
      framework: "pytorch"
      device: "gpu"
      path: "models/speech/ecapa_tdnn.pt"
      url: "https://huggingface.co/speechbrain/spkrec-ecapa-voxceleb"
      version: "1.0"
      enabled: true
      features:
        speaker_verification: true
        speaker_identification: true
        embedding_size: 192

# 语言检测
language_detection:
  models:
    - name: "langid-py"
      type: "language"
      framework: "python"
      device: "cpu"
      path: ""
      version: "1.1.6"
      enabled: true
      languages: 97

# 模型缓存配置
cache:
  enabled: true
  max_size_mb: 2048
  ttl_hours: 24
  preload: ["whisper-small", "coqui-tts"]

# 模型下载配置
download:
  sources:
    - name: "huggingface"
      url: "https://huggingface.co"
      priority: 1

    - name: "official"
      url: "https://models.mirexs.ai"
      priority: 2

    - name: "github"
      url: "https://github.com"
      priority: 3

  retry:
    max_attempts: 3
    delay_seconds: 5

  verify_checksum: true
  resume_download: true

# 性能优化
optimization:
  # 推理优化
  inference:
    batch_size: 8
    max_queue_size: 100
    timeout_seconds: 30

  # 内存优化
  memory:
    model_compression: true
    quantization: "int8"  # none, int8, fp16, mixed
    pruning: false

  # GPU优化
  gpu:
    cuda_graphs: true
    tensor_cores: true
    memory_pool: true