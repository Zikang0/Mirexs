# config/system/model_configs/vision_models.yaml
# 视觉模型配置
# 包含人脸识别、物体检测、图像分割等模型

# 通用视觉配置
general:
  # 图像处理配置
  image:
    default_width: 640
    default_height: 480
    channels: 3
    format: "RGB"
    quality: 95

  # 预处理配置
  preprocessing:
    resize: true
    normalize: true
    augment: false  # 训练时启用
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

  # 后处理配置
  postprocessing:
    confidence_threshold: 0.5
    iou_threshold: 0.45
    nms_enabled: true

# 人脸识别模型
face_recognition:
  # 默认人脸识别模型
  default_model: "insightface"

  models:
    - name: "insightface"
      type: "face_recognition"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/insightface"
      url: "https://github.com/deepinsight/insightface"
      version: "0.7.3"
      enabled: true
      priority: 1
      memory_mb: 500
      requires_gpu: true
      features:
        face_detection: true
        face_alignment: true
        face_recognition: true
        age_gender_estimation: true
        landmark_detection: true
      accuracy:
        lfw: 0.998
        cfp: 0.975
        agedb: 0.980

    - name: "facenet"
      type: "face_recognition"
      framework: "tensorflow"
      device: "gpu"
      path: "models/vision/facenet"
      url: "https://github.com/davidsandberg/facenet"
      version: "1.0"
      enabled: true
      priority: 2
      memory_mb: 300
      features:
        face_embedding: true
        face_verification: true
        face_identification: true

    - name: "dlib"
      type: "face_recognition"
      framework: "dlib"
      device: "cpu"
      path: "models/vision/dlib"
      url: "http://dlib.net"
      version: "19.24"
      enabled: true
      priority: 3
      memory_mb: 100
      features:
        face_detection: true
        landmark_detection: true
        face_encoding: true

# 表情识别模型
emotion_recognition:
  models:
    - name: "ferplus"
      type: "emotion"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/ferplus.pt"
      url: "https://github.com/microsoft/FERPlus"
      version: "1.0"
      enabled: true
      emotions: ["neutral", "happy", "sad", "surprise", "fear", "disgust", "anger", "contempt"]
      accuracy: 0.82

# 物体检测模型
object_detection:
  # 默认物体检测模型
  default_model: "yolov8n"

  models:
    - name: "yolov8n"
      type: "object_detection"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/yolov8n.pt"
      url: "https://github.com/ultralytics/ultralytics"
      version: "8.0"
      enabled: true
      priority: 1
      memory_mb: 300
      speed_ms: 6.5
      accuracy_map50: 0.375
      classes: 80

    - name: "yolov8s"
      type: "object_detection"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/yolov8s.pt"
      url: "https://github.com/ultralytics/ultralytics"
      version: "8.0"
      enabled: true
      priority: 2
      memory_mb: 500
      speed_ms: 9.5
      accuracy_map50: 0.444
      classes: 80

    - name: "yolov8m"
      type: "object_detection"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/yolov8m.pt"
      url: "https://github.com/ultralytics/ultralytics"
      version: "8.0"
      enabled: true
      priority: 3
      memory_mb: 800
      speed_ms: 16.0
      accuracy_map50: 0.496
      classes: 80

    - name: "detr"
      type: "object_detection"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/detr.pt"
      url: "https://github.com/facebookresearch/detr"
      version: "0.5"
      enabled: true
      priority: 4
      memory_mb: 1200
      accuracy_map50: 0.420
      classes: 91
      features:
        transformer_based: true
        end_to_end: true

# 姿态估计模型
pose_estimation:
  models:
    - name: "mediapipe-pose"
      type: "pose"
      framework: "mediapipe"
      device: "cpu"
      path: ""
      url: "https://github.com/google/mediapipe"
      version: "0.10.8"
      enabled: true
      keypoints: 33
      features:
        realtime: true
        multi_person: true
        world_landmarks: true

    - name: "openpose"
      type: "pose"
      framework: "openpose"
      device: "gpu"
      path: "models/vision/openpose"
      url: "https://github.com/CMU-Perceptual-Computing-Lab/openpose"
      version: "1.7.0"
      enabled: true
      keypoints: 25
      accuracy: 0.85

# 手势识别模型
gesture_recognition:
  models:
    - name: "mediapipe-hands"
      type: "gesture"
      framework: "mediapipe"
      device: "cpu"
      path: ""
      url: "https://github.com/google/mediapipe"
      version: "0.10.8"
      enabled: true
      hands: 2
      landmarks: 21
      gestures: ["thumbs_up", "thumbs_down", "victory", "ok", "point", "fist", "open_palm"]

    - name: "handtracking"
      type: "gesture"
      framework: "tensorflow"
      device: "gpu"
      path: "models/vision/handtracking"
      url: "https://github.com/victordibia/handtracking"
      version: "1.0"
      enabled: true
      gestures: 10

# 图像分割模型
segmentation:
  models:
    - name: "segment-anything"
      type: "segmentation"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/sam_vit_h.pth"
      url: "https://github.com/facebookresearch/segment-anything"
      version: "1.0"
      enabled: true
      memory_mb: 2500
      features:
        zero_shot: true
        interactive: true
        promptable: true

    - name: "deeplabv3"
      type: "segmentation"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/deeplabv3.pt"
      url: "https://pytorch.org/hub/pytorch_vision_deeplabv3_resnet101/"
      version: "1.0"
      enabled: true
      classes: 21

# 场景理解模型
scene_understanding:
  models:
    - name: "clip-vit-large"
      type: "scene"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/clip-vit-large.pt"
      url: "https://github.com/openai/CLIP"
      version: "1.0"
      enabled: true
      features:
        zero_shot: true
        multi_modal: true
        image_text_matching: true

    - name: "resnet50"
      type: "scene"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/resnet50.pt"
      url: "https://pytorch.org/vision/stable/models.html"
      version: "1.0"
      enabled: true
      classes: 1000

# 光学字符识别 (OCR)
ocr:
  models:
    - name: "easyocr"
      type: "ocr"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/easyocr"
      url: "https://github.com/JaidedAI/EasyOCR"
      version: "1.7.0"
      enabled: true
      languages: ["en", "zh", "ja", "ko", "fr", "de", "es", "ru"]

    - name: "paddleocr"
      type: "ocr"
      framework: "paddlepaddle"
      device: "gpu"
      path: "models/vision/paddleocr"
      url: "https://github.com/PaddlePaddle/PaddleOCR"
      version: "2.6"
      enabled: true
      languages: ["en", "zh", "ja", "ko", "fr", "de", "es", "ru", "ar"]

# 图像生成模型
image_generation:
  models:
    - name: "stable-diffusion-v2-1"
      type: "image_generation"
      framework: "diffusers"
      device: "gpu"
      path: "models/vision/stable-diffusion-v2-1"
      url: "https://huggingface.co/stabilityai/stable-diffusion-2-1"
      version: "2.1"
      enabled: true
      memory_mb: 5000
      features:
        text_to_image: true
        image_to_image: true
        inpainting: true
        outpainting: true

    - name: "controlnet"
      type: "image_generation"
      framework: "diffusers"
      device: "gpu"
      path: "models/vision/controlnet"
      url: "https://huggingface.co/lllyasviel/ControlNet"
      version: "1.0"
      enabled: true
      controls: ["canny", "depth", "hed", "mlsd", "normal", "openpose", "scribble", "seg"]

# 视频分析模型
video_analysis:
  models:
    - name: "slowfast"
      type: "video"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/slowfast.pt"
      url: "https://github.com/facebookresearch/SlowFast"
      version: "1.0"
      enabled: true
      actions: 400

    - name: "timesformer"
      type: "video"
      framework: "pytorch"
      device: "gpu"
      path: "models/vision/timesformer.pt"
      url: "https://github.com/facebookresearch/TimeSformer"
      version: "1.0"
      enabled: true
      actions: 400

# 模型缓存配置
cache:
  enabled: true
  max_size_mb: 4096  # 视觉模型通常较大
  ttl_hours: 48
  preload: ["yolov8n", "insightface"]

# 性能优化
optimization:
  # 推理优化
  inference:
    batch_size: 4  # 视觉模型batch size较小
    max_queue_size: 50
    timeout_seconds: 60

  # 内存优化
  memory:
    model_compression: true
    quantization: "fp16"
    pruning: false

  # 图像优化
  image:
    downsampling: true
    max_resolution: "1920x1080"
    jpeg_quality: 85