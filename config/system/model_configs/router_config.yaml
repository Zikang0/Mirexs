meta:
  schema_version: "2.0.0"
  last_updated: "2026-03-30"
  owner: "Mirexs Team"
  description: "SmartModelRouter 路由策略配置（与 infrastructure/model_hub/smart_model_router.py 对齐）"

router:
  enabled: true

  # 是否在路由阶段尝试预加载模型（默认 false，避免在权重未准备好时导致启动/路由失败）
  eager_load: false

  # 是否允许使用云端模型（在 restricted 场景会被强制禁用）
  allow_cloud_models: false

  # 路由策略版本（用于可观测与调参回溯）
  policy_version: "v2.0.1"

  # 全局策略参数（可选）
  policy:
    vram_overcommit_ratio: 1.15

    # 分项权重（总和建议为 1.0；实现会按给定权重进行线性组合）
    weights:
      capability: 0.40
      hardware_fit: 0.25
      latency: 0.15
      context_fit: 0.10
      reliability: 0.10

    # 不同任务类型的 P95 延迟预算（ms），用于 latency 归一化
    latency_budget_ms:
      casual_chat: 800
      emotional: 900
      realtime: 600
      coding: 2500
      analytical: 4500
      creative: 2000
      multi_step: 3500
      vision: 5000

  # 默认任务画像（当上层未提供 task_profile 时使用）
  defaults:
    task_type: "casual_chat"
    security_level: "normal"
    complexity: 0.5
    modalities: ["text"]
    estimated_output_tokens: 512

  # 约束与回退
  constraints:
    # 在 restricted 场景下：强制本地优先/禁用云端
    restricted_disable_cloud: true
    # 候选为空时：允许使用 registry 中 priority 最低的本地模型兜底（如仍为空则抛错）
    allow_empty_candidates_fallback: true

  fallback:
    # local_first | cloud_first | static
    strategy: "local_first"

    # static 策略下指定模型（可选）
    static_model_key: ""
