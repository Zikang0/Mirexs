# config/user/personalization/themes.yaml
# 主题设置配置
# 管理界面主题、颜色方案和视觉效果

# 活动主题配置
active_theme:
  # 当前活动主题
  name: "default"

  # 主题模式：auto, light, dark, custom
  mode: "auto"

  # 自动切换配置
  auto_switch:
    enabled: true
    based_on_time: true
    based_on_system: true
    custom_schedule:
      light_to_dark: "18:00"
      dark_to_light: "06:00"

  # 主题继承
  inheritance:
    parent_theme: "default"
    override_colors: false
    preserve_layout: true

# 内置主题
builtin_themes:
  # 默认主题
  default:
    name: "默认主题"
    type: "light"
    description: "标准的浅色主题"
    version: "1.0"

    # 颜色方案
    colors:
      primary: "#6200EE"
      secondary: "#03DAC6"
      accent: "#FF9800"
      background: "#FFFFFF"
      surface: "#F5F5F5"
      error: "#B00020"
      warning: "#FFC107"
      success: "#4CAF50"
      info: "#2196F3"
      text:
        primary: "#000000"
        secondary: "#666666"
        disabled: "#999999"
        inverse: "#FFFFFF"
      border: "#E0E0E0"
      divider: "#EEEEEE"

    # 字体配置
    fonts:
      family:
        primary: "system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        secondary: "Arial, Helvetica, sans-serif"
        monospace: "Monaco, 'Courier New', monospace"
      sizes:
        small: "12px"
        medium: "14px"
        large: "16px"
        xlarge: "20px"
      weights:
        light: 300
        normal: 400
        medium: 500
        bold: 700

    # 视觉效果
    effects:
      shadow:
        level: "medium"
        color: "rgba(0, 0, 0, 0.1)"
      rounded:
        corners: true
        radius: "8px"
      transparency:
        enabled: false
        level: 0.9

  # 深色主题
  dark:
    name: "深色主题"
    type: "dark"
    description: "适合夜间使用的深色主题"
    version: "1.0"

    colors:
      primary: "#BB86FC"
      secondary: "#03DAC6"
      accent: "#FF9800"
      background: "#121212"
      surface: "#1E1E1E"
      error: "#CF6679"
      warning: "#FFB74D"
      success: "#81C784"
      info: "#64B5F6"
      text:
        primary: "#FFFFFF"
        secondary: "#B0B0B0"
        disabled: "#666666"
        inverse: "#000000"
      border: "#333333"
      divider: "#2D2D2D"

    fonts:
      family:
        primary: "system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        secondary: "Arial, Helvetica, sans-serif"
        monospace: "Monaco, 'Courier New', monospace"
      sizes:
        small: "12px"
        medium: "14px"
        large: "16px"
        xlarge: "20px"
      weights:
        light: 300
        normal: 400
        medium: 500
        bold: 700

    effects:
      shadow:
        level: "high"
        color: "rgba(0, 0, 0, 0.3)"
      rounded:
        corners: true
        radius: "8px"
      transparency:
        enabled: false
        level: 0.9

  # 蓝色主题
  blue:
    name: "蓝色主题"
    type: "light"
    description: "以蓝色为主的清新主题"
    version: "1.0"

    colors:
      primary: "#2196F3"
      secondary: "#FF9800"
      accent: "#E91E63"
      background: "#E3F2FD"
      surface: "#FFFFFF"
      error: "#F44336"
      warning: "#FF9800"
      success: "#4CAF50"
      info: "#00BCD4"
      text:
        primary: "#0D47A1"
        secondary: "#546E7A"
        disabled: "#90A4AE"
        inverse: "#FFFFFF"
      border: "#BBDEFB"
      divider: "#E1F5FE"

    fonts:
      family:
        primary: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
        secondary: "Arial, Helvetica, sans-serif"
        monospace: "'Courier New', Courier, monospace"
      sizes:
        small: "12px"
        medium: "14px"
        large: "16px"
        xlarge: "20px"
      weights:
        light: 300
        normal: 400
        medium: 500
        bold: 700

    effects:
      shadow:
        level: "subtle"
        color: "rgba(33, 150, 243, 0.1)"
      rounded:
        corners: true
        radius: "12px"
      transparency:
        enabled: true
        level: 0.95

  # 绿色主题
  green:
    name: "绿色主题"
    type: "light"
    description: "护眼的绿色主题"
    version: "1.0"

    colors:
      primary: "#4CAF50"
      secondary: "#FFC107"
      accent: "#9C27B0"
      background: "#E8F5E9"
      surface: "#FFFFFF"
      error: "#F44336"
      warning: "#FF9800"
      success: "#4CAF50"
      info: "#00BCD4"
      text:
        primary: "#1B5E20"
        secondary: "#33691E"
        disabled: "#81C784"
        inverse: "#FFFFFF"
      border: "#C8E6C9"
      divider: "#F1F8E9"

    fonts:
      family:
        primary: "'Roboto', 'Helvetica Neue', Arial, sans-serif"
        secondary: "Arial, Helvetica, sans-serif"
        monospace: "Consolas, 'Courier New', monospace"
      sizes:
        small: "12px"
        medium: "14px"
        large: "16px"
        xlarge: "20px"
      weights:
        light: 300
        normal: 400
        medium: 500
        bold: 700

    effects:
      shadow:
        level: "medium"
        color: "rgba(76, 175, 80, 0.1)"
      rounded:
        corners: true
        radius: "6px"
      transparency:
        enabled: false
        level: 1.0

# 自定义主题
custom_themes:
  # 用户创建的主题
  user_created:
    - name: "my_custom_theme"
      type: "dark"
      description: "我的自定义主题"
      created: "2025-01-15"
      modified: "2025-01-20"

      colors:
        primary: "#9C27B0"
        secondary: "#00BCD4"
        accent: "#FF9800"
        background: "#1A1A1A"
        surface: "#2D2D2D"
        error: "#F44336"
        warning: "#FFC107"
        success: "#4CAF50"
        info: "#2196F3"
        text:
          primary: "#E0E0E0"
          secondary: "#B0B0B0"
          disabled: "#666666"
          inverse: "#000000"
        border: "#404040"
        divider: "#333333"

      fonts:
        family:
          primary: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        sizes:
          small: "13px"
          medium: "15px"
          large: "18px"
          xlarge: "24px"

      effects:
        shadow:
          level: "high"
          color: "rgba(0, 0, 0, 0.4)"
        rounded:
          corners: true
          radius: "10px"
        transparency:
          enabled: true
          level: 0.85

# 主题组件配置
components:
  # 按钮样式
  buttons:
    primary:
      background: "@primary"
      text: "@text.inverse"
      hover: "darken(@primary, 10%)"
      active: "darken(@primary, 20%)"

    secondary:
      background: "@surface"
      text: "@text.primary"
      border: "@border"
      hover: "@divider"

  # 卡片样式
  cards:
    background: "@surface"
    border: "1px solid @border"
    shadow: "0 2px 4px @shadow.color"
    radius: "@effects.rounded.radius"

  # 输入框样式
  inputs:
    background: "@surface"
    border: "1px solid @border"
    focus_border: "2px solid @primary"
    text: "@text.primary"
    placeholder: "@text.disabled"

  # 导航栏样式
  navigation:
    background: "@surface"
    text: "@text.primary"
    active: "@primary"
    hover: "@divider"

# 动态主题
dynamic_theming:
  # 动态颜色
  dynamic_colors:
    enabled: true
    source: "wallpaper"  # wallpaper, accent, custom
    extraction_method: "vibrant"

  # 动画过渡
  transitions:
    enabled: true
    duration: "300ms"
    easing: "cubic-bezier(0.4, 0, 0.2, 1)"

  # 主题变体
  variants:
    generate_variants: true
    lighten_percent: 10
    darken_percent: 20

# 主题导入/导出
import_export:
  # 导出格式
  export_formats:
    - "json"
    - "css"
    - "yaml"

  # 导入源
  import_sources:
    - "theme_store"
    - "file"
    - "url"

  # 主题市场
  theme_marketplace:
    enabled: false
    url: "https://themes.mirexs.ai"
    auto_update: false

# 主题性能
performance:
  # 缓存策略
  caching:
    enabled: true
    cache_generated_css: true
    cache_duration: "1h"

  # 优化策略
  optimization:
    minify_css: true
    tree_shaking: true
    lazy_loading: true

  # 内存管理
  memory:
    max_themes_in_memory: 5
    theme_cleanup: true


