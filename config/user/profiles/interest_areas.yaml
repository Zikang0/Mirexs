# 兴趣深度分析
interest_analysis:
  interest_clusters:
    - cluster: "ai_development"
      intensity: 5.0
      topics: ["machine_learning", "nlp", "generative_ai"]

    - cluster: "software_engineering"
      intensity: 4.2
      topics: ["python_development", "web_development", "devops"]

  interest_stability:
    stable_interests: ["programming", "ai", "learning"]
    fluctuating_interests: ["blockchain", "game_development"]
    new_interests: ["ai_ethics", "explainable_ai"]

  seasonal_variations:
    winter: ["indoor_hobbies", "deep_learning"]
    summer: ["outdoor_activities", "light_reading"]

# 兴趣探索历史
exploration_history:
  recently_explored:
    - topic: "vector_databases"
      date: "2024-01-10"
      duration_minutes: 120

    - topic: "fastapi_advanced"
      date: "2024-01-08"
      duration_minutes: 90

  frequently_visited_topics:
    - "python_ml"
    - "ai_tutorials"
    - "system_design"

  discovery_pattern:
    weekly_new_topics: 3
    average_exploration_depth: "moderate"

# 兴趣匹配度
interest_matching:
  current_focus_match: 0.85  # 当前学习内容与兴趣的匹配度
  recommendation_effectiveness: 0.78  # 推荐系统的效果
  exploration_satisfaction: 0.82  # 探索新兴趣的满意度

# 统计信息
statistics:
  total_interests_tracked: 0
  primary_interest_domains: []
  interest_diversity_score: 0.0
  interest_evolution_rate: 0.0
  last_interest_update: "{{ update_date }}"