# 实时优化配置
# 优化系统实时性能和响应时间

enabled: true
optimization_mode: balanced  # balanced, performance, quality

latency_targets:
  speech_recognition: 200  # ms
  text_generation: 500
  image_processing: 300
  3d_rendering: 16.67  # 60 FPS
  database_query: 100
  network_request: 50
  file_io: 20
  memory_access: 1

throughput_targets:
  speech_recognition: 10  # 请求/秒
  text_generation: 5
  image_processing: 20
  3d_rendering: 60  # FPS
  database_queries: 1000
  network_requests: 10000

optimization_strategies:
  caching:
    enabled: true
    ttl_seconds: 300
    max_size_mb: 1024
    eviction_policy: lru
    compression: zstd
    compression_level: 3
    
    cache_levels:
      l1:
        type: memory
        size_mb: 256
        ttl_seconds: 60
        
      l2:
        type: disk
        size_mb: 10240
        ttl_seconds: 300
        
      l3:
        type: redis
        size_mb: 102400
        ttl_seconds: 3600
  
  batching:
    enabled: true
    max_batch_size: 64
    timeout_ms: 50
    dynamic_batching: true
    min_batch_size: 1
    
    batch_queues:
      inference:
        max_queue_size: 1000
        timeout_ms: 100
        
      rendering:
        max_queue_size: 100
        timeout_ms: 16
        
      data_processing:
        max_queue_size: 5000
        timeout_ms: 200
  
  pipelining:
    enabled: true
    stages: 3
    buffer_size: 100
    prefetch_factor: 2
    parallel_pipelines: 4
    
    pipeline_stages:
      stage1: data_loading
      stage2: preprocessing
      stage3: inference
      stage4: postprocessing
  
  prefetching:
    enabled: true
    prefetch_distance: 5
    lookahead_samples: 10
    cache_prefetch: true
    
    prefetch_targets:
      - model_weights
      - texture_data
      - audio_samples
      - user_profiles
  
  compression:
    enabled: true
    algorithm: zstd
    level: 3
    min_size_kb: 1
    
    compressible_data:
      - network_packets
      - cache_entries
      - log_files
      - temporary_data

resource_limits:
  cpu:
    max_usage_percent: 90
    burst_limit: 100
    reservation_percent: 10
    
  memory:
    max_usage_percent: 85
    swap_limit: 20  # GB
    cache_limit: 50  # %
    
  gpu:
    max_usage_percent: 95
    memory_limit_percent: 90
    temperature_limit: 85  # °C
    
  network:
    bandwidth_limit_mbps: 1000
    connection_limit: 10000
    packet_loss_threshold: 0.01

quality_of_service:
  enabled: true
  traffic_classes:
    
    realtime:
      priority: 7
      bandwidth_percent: 40
      latency_ms: 20
      jitter_ms: 5
      packet_loss: 0.001
      
      services:
        - speech_recognition
        - 3d_rendering
        - video_streaming
    
    interactive:
      priority: 5
      bandwidth_percent: 30
      latency_ms: 100
      jitter_ms: 20
      packet_loss: 0.01
      
      services:
        - text_generation
        - image_processing
        - web_browsing
    
    bulk:
      priority: 3
      bandwidth_percent: 20
      latency_ms: 500
      jitter_ms: 100
      packet_loss: 0.05
      
      services:
        - file_transfer
        - backup
        - data_sync
    
    background:
      priority: 1
      bandwidth_percent: 10
      latency_ms: 1000
      jitter_ms: 200
      packet_loss: 0.1
      
      services:
        - logging
        - metrics_collection
        - maintenance_tasks

monitoring:
  sampling_rate: 1.0  # 100%
  metrics_interval: 60  # seconds
  alert_threshold: 0.9  # 90% utilization
  
  metrics_to_monitor:
    - latency_all
    - throughput_all
    - error_rate
    - resource_utilization
    - cache_hit_rate
    - queue_length
  
  alert_rules:
    - metric: latency.speech_recognition
      condition: "> 300"
      duration: 10
      severity: warning
      action: reduce_batch_size
      
    - metric: latency.3d_rendering
      condition: "> 33.33"  # 30 FPS
      duration: 5
      severity: critical
      action: reduce_quality
      
    - metric: cpu_utilization
      condition: "> 0.9"
      duration: 30
      severity: critical
      action: scale_up

profiles:
  performance:
    optimization_mode: performance
    latency_targets:
      speech_recognition: 100
      text_generation: 300
      3d_rendering: 8.33  # 120 FPS
    quality_tradeoff: 0.7
    
  quality:
    optimization_mode: quality
    latency_targets:
      speech_recognition: 300
      text_generation: 1000
      3d_rendering: 33.33  # 30 FPS
    quality_tradeoff: 1.0
    
  balanced:
    optimization_mode: balanced
    latency_targets:
      speech_recognition: 200
      text_generation: 500
      3d_rendering: 16.67  # 60 FPS
    quality_tradeoff: 0.85
    
  mobile:
    optimization_mode: performance
    latency_targets:
      speech_recognition: 300
      text_generation: 1000
      3d_rendering: 33.33  # 30 FPS
    quality_tradeoff: 0.5
