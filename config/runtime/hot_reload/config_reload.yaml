# 配置重载配置（v2）
# 动态重新加载系统配置（目录统一为 hot_reload）

enabled: true
reload_mode: partial  # full, partial, incremental

reload_strategies:
  full_reload:
    enabled: true
    trigger: file_change
    check_interval: 5  # 秒
    validate_before_reload: true
    backup_before_reload: true
    
    file_monitoring:
      enabled: true
      watched_directories:
        - /config
        - /config/runtime
      recursive: true
      patterns:
        - "*.yaml"
        - "*.yml"
        - "*.json"
  
  partial_reload:
    enabled: true
    trigger: api_request
    api_endpoint: /api/config/reload
    require_auth: true
    validate_changes: true
    
    allowed_changes:
      - runtime.dynamic_config
      - runtime.performance_tuning
      - runtime.hot_reload
      - user.preferences
      - system.services
  
  incremental_reload:
    enabled: true
    trigger: config_change
    track_changes: true
    atomic_updates: true
    
    change_detection:
      method: hash_based
      hash_algorithm: sha256
      compare_interval: 1

safety_checks:
  validation_enabled: true
  validation_rules:
    - rule: schema_validation
      enabled: true
      schema_path: /config/schemas/
      
    - rule: dependency_check
      enabled: true
      check_circular: true
      
    - rule: compatibility_check
      enabled: true
      check_versions: true
  
  backup_before_reload: true
  backup_config:
    location: /backups/config
    retention_days: 7
    compression: true
    encryption: false
  
  rollback_on_failure: true
  rollback_config:
    max_attempts: 3
    attempt_delay: 5
    fallback_strategy: last_known_good
  
  dry_run_enabled: true
  dry_run_timeout: 10

notification:
  notify_on_reload: true
  notification_channels:
    - log
    - event
    - email
    - webhook
  
  log_config:
    level: info
    format: json
    include_details: true
    
  event_config:
    event_types:
      - config.reload.start
      - config.reload.success
      - config.reload.failure
      - config.reload.rollback
    include_metadata: true
    
  email_config:
    enabled: false
    recipients: []
    subject_template: "Mirexs Config Reload: {status}"
    
  webhook_config:
    enabled: false
    endpoints: []
    timeout: 5
    retry_attempts: 3

performance:
  reload_timeout: 30
  max_concurrent_reloads: 3
  resource_limits:
    cpu_percent: 50
    memory_mb: 512
    
  caching:
    enabled: true
    cache_configs: true
    cache_parsed: true
    cache_ttl: 300

monitoring:
  enabled: true
  metrics_collection:
    - reload_count
    - reload_duration
    - success_rate
    - failure_causes
    - validation_errors
    
  metrics_storage:
    backend: prometheus
    retention_days: 30
    sampling_interval: 60
    
  alerting:
    alert_on_failure: true
    failure_threshold: 3
    alert_on_performance_degradation: true
    degradation_threshold: 0.2
    
  logging:
    enabled: true
    log_level: info
    log_format: json
    log_rotation:
      max_size_mb: 100
      backup_count: 5

profiles:
  development:
    reload_mode: partial
    check_interval: 2
    validation_enabled: false
    backup_before_reload: false
    notification_channels: [log]
    
  production:
    reload_mode: incremental
    check_interval: 10
    validation_enabled: true
    backup_before_reload: true
    notification_channels: [log, event, email]
    dry_run_enabled: true
    
  testing:
    reload_mode: full
    check_interval: 1
    validation_enabled: true
    backup_before_reload: false
    notification_channels: [log]

security:
  authentication_required: true
  authorization_rules:
    - role: admin
      permissions: [reload_all, modify_all]
    - role: developer
      permissions: [reload_runtime, modify_runtime]
    - role: operator
      permissions: [reload_services, view_status]
  
  audit_logging:
    enabled: true
    log_all_actions: true
    retention_days: 90
    encryption: true
  
  input_validation:
    enabled: true
    sanitize_inputs: true
    max_config_size_mb: 10
    allowed_file_types: [yaml, yml, json]
