# 服务重载配置（v2）
# 动态重新加载系统服务

enabled: true
reload_scope: all_services  # all_services, microservices, background_services

service_categories:
  microservices:
    - inference_service
    - rendering_service
    - database_service
    - api_gateway
    - message_broker
  
  background_services:
    - monitoring_service
    - logging_service
    - caching_service
    - scheduler_service
  
  scheduled_tasks:
    - backup_task
    - cleanup_task
    - report_generation
    - model_training
  
  api_endpoints:
    - rest_api
    - websocket_api
    - grpc_api
    - webhook_handler

reload_methods:
  rolling_restart:
    enabled: true
    batch_size: 1
    delay_between_batches: 30
    health_check_enabled: true
    
    restart_config:
      graceful_shutdown: true
      shutdown_timeout: 30
      startup_timeout: 60
      max_retries: 3
  
  blue_green:
    enabled: false
    traffic_switch_delay: 60
    health_check_required: true
    
    deployment_config:
      blue_group: services_blue
      green_group: services_green
      active_group: blue
      switch_strategy: gradual
  
  drain_and_refill:
    enabled: true
    drain_timeout: 300
    connection_drain: true
    graceful_drain: true
    
    drain_config:
      stop_new_connections: true
      wait_for_requests: true
      max_wait_time: 60
  
  in_place_reload:
    enabled: false
    reload_signal: SIGHUP
    config_reload: true
    state_preservation: true

dependency_management:
  check_dependencies: true
  dependency_graph: true
  order_of_operations: true
  
  dependency_resolution:
    algorithm: topological_sort
    max_depth: 5
    circular_detection: true
    
  service_dependencies:
    api_gateway:
      depends_on: [inference_service, database_service]
    inference_service:
      depends_on: [model_loader, caching_service]
    rendering_service:
      depends_on: [gpu_manager, asset_loader]
  
  load_balancing:
    enabled: true
    strategy: round_robin
    health_check: true
    session_affinity: false

health_monitoring:
  enabled: true
  health_check_config:
    endpoint: /health
    interval: 30
    timeout: 5
    retries: 3
    success_threshold: 2
    failure_threshold: 3
  
  readiness_probes:
    enabled: true
    endpoint: /ready
    initial_delay: 10
    period: 5
    timeout: 3
    success_threshold: 1
    failure_threshold: 3
  
  liveness_probes:
    enabled: true
    endpoint: /live
    initial_delay: 30
    period: 10
    timeout: 3
    success_threshold: 1
    failure_threshold: 3

state_management:
  preserve_state: true
  state_backup: true
  
  state_types:
    session_state: true
    connection_state: true
    transaction_state: true
    cache_state: true
  
  state_transfer:
    enabled: true
    transfer_method: incremental
    compression: true
    encryption: true
  
  state_recovery:
    enabled: true
    recovery_point: last_backup
    max_recovery_time: 300

rollback_strategy:
  enabled: true
  automatic_rollback: true
  rollback_triggers:
    - health_check_failure
    - performance_degradation
    - dependency_failure
    - timeout
  
  rollback_method: rolling_restart
  rollback_timeout: 180
  max_rollback_attempts: 3
  
  rollback_safety:
    verify_state: true
    atomic_rollback: true
    preserve_data: true

monitoring:
  enabled: true
  metrics_collection:
    - service_uptime
    - reload_count
    - reload_duration
    - error_rate
    - latency
    - resource_usage
    - dependency_health
  
  log_collection:
    enabled: true
    log_level: info
    log_format: json
    log_aggregation: true
    
  alerting:
    alert_on_failure: true
    failure_threshold: 3
    alert_on_health_degradation: true
    degradation_threshold: 0.2
    
  dashboard:
    enabled: true
    refresh_interval: 5
    metrics_display:
      - service_status
      - health_checks
      - resource_usage
      - error_rates

profiles:
  production:
    reload_method: rolling_restart
    batch_size: 1
    health_check_enabled: true
    automatic_rollback: true
    monitoring_enabled: true
    
  development:
    reload_method: in_place_reload
    health_check_enabled: false
    automatic_rollback: false
    monitoring_enabled: true
    
  high_availability:
    reload_method: blue_green
    health_check_enabled: true
    automatic_rollback: true
    monitoring_enabled: true
    state_preservation: true

security:
  authentication_required: true
  authorization_rules:
    - role: admin
      permissions: [reload_all, restart_all, stop_all]
    - role: operator
      permissions: [reload_services, restart_services, view_status]
    - role: developer
      permissions: [reload_own_services, view_logs]
  
  audit_logging:
    enabled: true
    log_all_actions: true
    retention_days: 90
    encryption: true
  
  network_security:
    enabled: true
    firewall_rules: []
    rate_limiting: true
    max_connections: 1000
