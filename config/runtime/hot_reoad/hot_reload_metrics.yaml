# 热重载指标配置
# 监控和记录热重载性能指标

enabled: true
metrics_collection:
  frequency:
    enabled: true
    aggregation: count_per_minute
    retention: 1440  # 24小时数据点
    
  duration:
    enabled: true
    aggregation: histogram
    buckets: [0.1, 0.5, 1, 5, 10, 30, 60]
    retention: 10080  # 7天数据点
    
  success_rate:
    enabled: true
    aggregation: percentage
    window_size: 100
    retention: 10080
    
  error_rate:
    enabled: true
    aggregation: percentage
    window_size: 100
    retention: 10080
    
  performance_impact:
    enabled: true
    metrics:
      - cpu_usage_delta
      - memory_usage_delta
      - latency_delta
      - throughput_delta
    aggregation: average
    retention: 10080
  
  resource_usage:
    enabled: true
    metrics:
      - cpu_usage
      - memory_usage
      - disk_io
      - network_io
    sampling_interval: 1
    retention: 1440

metrics_storage:
  storage_backend: prometheus
  backup_backend: influxdb
  
  prometheus_config:
    url: http://localhost:9090
    job_name: mirexs_hot_reload
    scrape_interval: 15
    retention_time: 30d
    
  influxdb_config:
    url: http://localhost:8086
    database: mirexs_metrics
    retention_policy: 30d
    batch_size: 1000
    flush_interval: 10
  
  local_storage:
    enabled: true
    directory: /metrics/hot_reload
    file_format: parquet
    compression: snappy
    retention_days: 30
  
  export_config:
    enabled: true
    export_format: json
    export_interval: 3600
    export_location: /exports/metrics

alerting:
  alert_on_failure: true
  failure_threshold: 3
  failure_window: 300
  
  alert_on_performance_degradation: true
  degradation_threshold: 0.2  # 20% performance drop
  degradation_window: 600
  
  alert_on_resource_exhaustion: true
  resource_thresholds:
    cpu_usage: 0.9
    memory_usage: 0.9
    disk_usage: 0.9
  
  alert_channels:
    log:
      enabled: true
      level: error
      
    email:
      enabled: false
      recipients: []
      smtp_server: ""
      
    webhook:
      enabled: true
      endpoints:
        - http://localhost:8000/alerts
      timeout: 5
      
    slack:
      enabled: false
      webhook_url: ""
      channel: "#alerts"
  
  alert_escalation:
    enabled: true
    levels:
      - level: warning
        delay: 300
        channels: [log]
      - level: critical
        delay: 60
        channels: [log, webhook]
      - level: emergency
        delay: 0
        channels: [log, webhook, email]

analytics:
  collect_analytics: true
  anonymize_data: true
  data_retention_days: 90
  
  usage_patterns:
    enabled: true
    patterns:
      - reload_frequency_by_time
      - reload_duration_by_component
      - success_rate_by_component
      - error_patterns
      - performance_trends
  
  performance_analysis:
    enabled: true
    analysis_types:
      - trend_analysis
      - correlation_analysis
      - anomaly_detection
      - root_cause_analysis
    
    algorithms:
      - moving_average
      - exponential_smoothing
      - arima
      - machine_learning
  
  reporting:
    enabled: true
    report_types:
      - daily_summary
      - weekly_analysis
      - monthly_trends
      - performance_report
    
    report_destination:
      email: false
      dashboard: true
      file: true
      api: true
    
    report_schedule:
      daily: "0 2 * * *"
      weekly: "0 3 * * 1"
      monthly: "0 4 1 * *"

visualization:
  enabled: true
  dashboard_type: grafana
  
  grafana_config:
    url: http://localhost:3000
    dashboard_id: mirexs_hot_reload
    refresh_interval: 5
    
  charts:
    - chart: reload_frequency
      type: line
      title: "Reload Frequency"
      metrics: [reload_count]
      time_range: 24h
      
    - chart: success_rate
      type: gauge
      title: "Success Rate"
      metrics: [success_rate]
      thresholds: [0.9, 0.95]
      
    - chart: reload_duration
      type: histogram
      title: "Reload Duration Distribution"
      metrics: [reload_duration]
      buckets: [0.1, 0.5, 1, 5, 10, 30, 60]
      
    - chart: error_breakdown
      type: pie
      title: "Error Breakdown by Component"
      metrics: [error_count]
      group_by: component
      
    - chart: performance_impact
      type: bar
      title: "Performance Impact"
      metrics: [cpu_usage_delta, memory_usage_delta, latency_delta]
      time_range: 1h
  
  realtime_monitoring:
    enabled: true
    update_interval: 1
    max_data_points: 1000
    anomaly_detection: true

profiles:
  detailed:
    metrics_collection:
      frequency: true
      duration: true
      success_rate: true
      error_rate: true
      performance_impact: true
      resource_usage: true
    storage_backend: prometheus
    alerting: detailed
    analytics: detailed
    visualization: detailed
    
  balanced:
    metrics_collection:
      frequency: true
      duration: true
      success_rate: true
      error_rate: false
      performance_impact: true
      resource_usage: false
    storage_backend: local_storage
    alerting: basic
    analytics: basic
    visualization: basic
    
  minimal:
    metrics_collection:
      frequency: true
      duration: false
      success_rate: true
      error_rate: false
      performance_impact: false
      resource_usage: false
    storage_backend: local_storage
    alerting: none
    analytics: none
    visualization: none

integration:
  with_system_metrics: true
  system_metrics_source: prometheus
  
  with_application_metrics: true
  application_metrics_endpoint: /metrics
  
  with_business_metrics: false
  business_metrics_source: custom
  
  correlation_enabled: true
  correlation_fields:
    - timestamp
    - component
    - user_id
    - session_id
  
  aggregation_enabled: true
  aggregation_levels:
    - minute
    - hour
    - day
    - week